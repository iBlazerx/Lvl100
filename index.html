<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f4f3ef; --bg3: #eceae4;
  --text: #1a1a18; --text2: #6b6a65; --text3: #a09f9a;
  --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
  --r: 8px; --rl: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #333331;
    --text: #f0efeb; --text2: #a09f9a; --text3: #6b6a65;
    --border: rgba(255,255,255,0.10); --border2: rgba(255,255,255,0.20);
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 2rem; }
header { padding: 1.5rem 1rem 0; max-width: 760px; margin: 0 auto; }
header h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
header p { font-size: 13px; color: var(--text2); }
.tabs-wrap { max-width: 760px; margin: 1.25rem auto 0; padding: 0 1rem; display: flex; gap: 6px; flex-wrap: wrap; }
.tab { padding: 6px 14px; font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--r); cursor: pointer; background: transparent; color: var(--text2); transition: all .15s; font-family: inherit; }
.tab:hover { background: var(--bg2); color: var(--text); }
.tab.active { background: var(--text); color: var(--bg); border-color: transparent; }
.panel { display: none; max-width: 760px; margin: 0 auto; padding: 1rem; }
.panel.active { display: block; }
.legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 1rem; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
.leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.fights { display: flex; flex-direction: column; gap: 5px; }
.fight { display: flex; align-items: center; gap: 8px; }
.fight-name { font-size: 12px; color: var(--text2); min-width: 175px; max-width: 175px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fight-name.leader { font-weight: 500; color: var(--text); }
.bar-wrap { flex: 1; background: var(--bg3); border-radius: 3px; height: 16px; overflow: hidden; }
.bar { height: 100%; border-radius: 3px; }
.bar.route  { background: #888780; }
.bar.gym    { background: #534AB7; }
.bar.elite  { background: #0F6E56; }
.bar.champ  { background: #993C1D; }
.fight-lv { font-size: 12px; font-weight: 500; color: var(--text2); min-width: 28px; text-align: right; }
@media (max-width: 480px) { .fight-name { min-width: 135px; max-width: 135px; font-size: 11px; } .fight-lv { font-size: 11px; } }
</style>
</head>

const LABELS={route:"Entrenadores ruta",gym:"Lider / Kahuna / Totem",elite:"Alto Mando",champ:"Campeon"};
const tabsEl=document.getElementById('tabs');
const panelsEl=document.getElementById('panels');
GAMES.forEach((g,gi)=>{
  const tab=document.createElement('button');
  tab.className='tab'+(gi===0?' active':'');
  tab.textContent=g.name;
  tab.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+g.id).classList.add('active');
  };
  tabsEl.appendChild(tab);
  const panel=document.createElement('div');
  panel.className='panel'+(gi===0?' active':'');
  panel.id='panel-'+g.id;
  const legend=document.createElement('div');
  legend.className='legend';
  Object.entries(LABELS).forEach(([k,v])=>{
    legend.innerHTML+=`<span class="leg-item"><span class="leg-dot" style="background:${COLORS[k]}"></span>${v}</span>`;
  });
  panel.appendChild(legend);
  const fights=document.createElement('div');
  fights.className='fights';

    const row=document.createElement('div');
    row.className='fight';
    const isLeader=f.t!=='route';

  });
